<!DOCTYPE html>
  <html lang="es">
    <head>
     <title>Login</title>
       <meta charset="utf-8">
         <meta name="description" content="This is a directory of Code Hive for login and create accounts">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
        body {
          background-color: rgba(20, 20, 160, 0.8);
          margin: 0;
          border: 0;
        }

        #loginSpace {
          background-color: #b2a6e8;
          border-radius: 60px;
          position: relative;
          top: 120px;
          margin: 20px;
        }

        #textCreateAccount {
          background-color: rgba(60, 40, 80, 1.0);
          color: #000000;
          text-align: center;
        }

        #name {
          background-color: rgba(0, 0, 60, 0.6);
          border-radius: 60px;
          text-decoration: none;
        }
        
        #password {
          background-color: rgba(0, 0, 60, 0.6);
          border-radius: 60px;
          text-decoration: none;
        }
        
      </style>
    </head>
    <body>
      <div id="loginSpace">
         <h2 id="textCreateAccount">Crear Cuenta</h2>
        <input name="Nombre" type="text" placeholder="Ingresa tu nombre" id="name">
          <br>
        <input name="Contraseña" type="password" placeholder="Ingresa tu contraseña" id="password">
      </div>
    </body>
  </html>
